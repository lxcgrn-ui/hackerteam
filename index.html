<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - OVERRIDE MULTIPLEXER</title>
    <style>
        body {
            background-color: #050505; /* 深黑底色 */
            color: #39ff14; /* 螢光霓虹綠 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.4;
            margin: 0;
            padding: 30px;
            overflow: hidden;
            height: 100vh;
            /* 螢幕微發光與掃描線特效 */
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.7);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
        }

        #container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 成功指令的特別顏色 */
        .status-ok {
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.9);
        }

        /* 警告或核心動作 */
        .status-action {
            color: #ffff00;
        }

        /* 模擬游標 */
        #cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #39ff14;
            vertical-align: bottom;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 8px #39ff14;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            50.1%, 100% { opacity: 0; }
        }

        /* 隱藏捲軸但保留功能 */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="container"><span id="output"></span><span id="cursor"></span></div>

    <script>
        // 裝逼指令庫：包含程式碼、指令、成功訊息、進度條
        const commands = [
            "root@kali:~# nmap -sS -A -v 192.168.1.254\n",
            "Starting Nmap 7.92 ( https://nmap.org ) at 2026-06-19 13:32 UTC\n",
            "Initiating ARP Ping Scan at 13:32...\n",
            "Scanning 192.168.1.254 [1 port]\n",
            "<span class='status-ok'>[OK] DISCOVERED OPEN PORT: 22 (SSH)</span>\n",
            "<span class='status-ok'>[OK] DISCOVERED OPEN PORT: 80 (HTTP)</span>\n",
            "<span class='status-ok'>[OK] DISCOVERED OPEN PORT: 443 (HTTPS)</span>\n",
            "root@kali:~# ./exploit_payload --target 192.168.1.254 --port 22\n",
            "<span class='status-action'>[SYSTEM] INITIATING BUFFER OVERFLOW ATTACK...</span>\n",
            "Sending crafted payload (1024 bytes) [■■■■■■■■■■■■■■■■] 100%\n",
            "Stack pointer intercepted at 0x7FFF1234\n",
            "Overwriting return address with NOP sled...\n",
            "<span class='status-ok'>[SUCCESS] VULNERABILITY EXPLOITED. INJECTING SHELLCODE...</span>\n",
            "root@kali:~# establish_connection --secure-tunnel --bypass-firewall\n",
            "Allocating virtual socket memory... Done.\n",
            "Bypassing AWS WAF Cloud Shield... [ATTEMPT 1] -> <span class='status-ok'>PASSED</span>\n",
            "Tunneling through proxy: 128.23.45.12 -> 88.211.4.9\n",
            "<span class='status-ok'>[CONNECTION] BACKDOOR ESTABLISHED AT PORT 4444</span>\n",
            "root@kali:~# cat /etc/shadow | grep admin\n",
            "admin:$6$aS81ndH9$vXo91m... [HASH FOUND]\n",
            "<span class='status-action'>[DECRYPTING] RUNNING BRUTE-FORCE ON SHA-512 HASH...</span>\n",
            "Searching matrix dictionary... [ 15,400,000 keys/sec ]\n",
            "Progress: [■■■■□□□□□□□□□□□□] 25%\n",
            "Progress: [■■■■■■■■■■□□□□□□] 62%\n",
            "Progress: [■■■■■■■■■■■■■■■■] 100%\n",
            "<span class='status-ok'>[OK] DECRYPTION SUCCESSFUL! PLAIN TEXT: 'P@ssw0rd2026!'</span>\n",
            "root@kali:~# ssh admin@192.168.1.254\n",
            "Warning: Permanently added '192.168.1.254' (RSA) to the list of known hosts.\n",
            "Password: *************\n",
            "<span class='status-ok'>[ACCESS GRANTED] WELCOME TO THE CORE MAINFRAME.</span>\n",
            "--------------------------------------------------\n",
            "INITIALIZING FILE SYSTEM INFILTRATION...\n",
            "Downloading database backups... [■■■■■■■■■■■■■■■■] 100% (4.2GB)\n",
            "<span class='status-ok'>[OK] DATA EXTRACTION COMPLETE. ERASING LOGS TO PREVENT DETECTION...</span>\n",
            "Shredding /var/log/auth.log... <span class='status-ok'>DONE</span>\n",
            "Shredding /var/log/syslog... <span class='status-ok'>DONE</span>\n",
            "<span class='status-action'>[STATUS] TERMINAL CLEAN. EXITING COMPROMISED NODE.</span>\n\n"
        ];

        const outputSpan = document.getElementById('output');
        const container = document.getElementById('container');
        let cmdIndex = 0;

        function triggerNextLine() {
            if (cmdIndex < commands.length) {
                // 直接噴出一整條帥氣指令或狀態
                outputSpan.innerHTML += commands[cmdIndex];
                cmdIndex++;

                // 自動滾動到底部
                container.scrollTop = container.scrollHeight;

                // 隨機控制下一條指令出現的時間（50ms ~ 300ms），製造真人瘋狂操作的節奏感
                const nextDelay = Math.random() * 250 + 50;
                setTimeout(triggerNextLine, nextDelay);
            } else {
                // 全部跑完後，隔兩秒清空重來
                setTimeout(() => {
                    cmdIndex = 0;
                    outputSpan.innerHTML = "<span class='status-action'>[SYSTEM] RESETTING TERMINAL MULTIPLEXER...</span>\n\n";
                    triggerNextLine();
                }, 2000);
            }
        }

        // 監聽鍵盤事件：只要使用者在鍵盤上「隨便亂敲」，就會觸發指令噴出！
        // 如果手放開不敲，它也會自動以固定速度慢慢跑，確保裝逼不中斷。
        window.addEventListener('keydown', (e) => {
            e.preventDefault(); // 防止按鍵原生功能（如空白鍵捲動網頁）
            triggerNextLine();
        });

        // 初始自動啟動一次，引導畫面
        setTimeout(triggerNextLine, 500);
    </script>
</body>
</html>
