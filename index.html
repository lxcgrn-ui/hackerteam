<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER TYPER - INITIALIZING...</title>
    <style>
        body {
            background-color: #000; /* 全黑背景 */
            color: #0f0; /* 經典矩陣綠色文字 */
            font-family: 'Courier New', Courier, monospace; /* 固定寬度字型，更有代碼感 */
            font-size: 18px;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* 隱藏原生捲軸 */
            height: 100vh;
        }

        #container {
            width: 100%;
            height: 100%;
            overflow-y: auto; /* 允許垂直捲動 */
            white-space: pre-wrap; /* 保留換行和空白 */
            word-wrap: break-word; /* 自動斷行 */
        }

        /* 模擬游標 */
        #cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            vertical-align: bottom;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            50.1%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container"><span id="output"></span><span id="cursor"></span></div>

    <script>
        // 要顯示的模擬駭客代碼 (可以自行貼上更長的代碼)
        const sourceCode = `

        const outputSpan = document.getElementById('output');

        const minSpeed = 20;

        function typeCode() {
            if (index < sourceCode.length) {
                // 每次增加一個字元

</body>
</html>
